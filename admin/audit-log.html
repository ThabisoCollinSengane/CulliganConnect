<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audit Log – CulliganConnect</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand"><span class="drop">C</span> CulliganConnect · Admin</div>
    <nav>
      <a href="/admin/index.html">Dashboard</a>
      <a href="/admin/cases.html">Cases</a>
      <a href="/admin/users.html">Agents</a>
      <a href="/admin/templates.html">Templates</a>
      <a href="/admin/reports.html">Reports</a>
      <a href="/admin/settings.html">Setup</a>
      <a href="/admin/audit-log.html" class="active">Audit Log</a>
      <a href="#" id="logout-link">Sign out</a>
    </nav>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <a href="/admin/index.html">Dashboard</a>
      <a href="/admin/cases.html">Cases</a>
      <a href="/admin/users.html">Agents</a>
      <a href="/admin/templates.html">Templates</a>
      <a href="/admin/reports.html">Reports</a>
      <a href="/admin/settings.html">Departments &amp; Setup</a>
      <a href="/admin/audit-log.html" class="active">Audit Log</a>
    </aside>

    <main class="main">
      <div class="card">
        <h2 style="margin:0 0 4px;">Audit log</h2>
        <p class="hint">Most recent 100 admin/system actions.</p>
        <table id="audit-table">
          <thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Entity</th><th>Detail</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module">
    import { supabase } from '/js/supabaseClient.js';
    import { requireRole, signOut } from '/js/auth.js';

    const profile = await requireRole(['admin']);
    if (profile) {
      await loadAuditLog();
    }

    document.getElementById('logout-link').addEventListener('click', (e) => {
      e.preventDefault();
      signOut();
    });

    async function loadAuditLog() {
      const { data, error } = await supabase
        .from('audit_log')
        .select('id, action, entity_type, entity_id, detail, created_at, profiles(full_name)')
        .order('created_at', { ascending: false })
        .limit(100);

      const tbody = document.querySelector('#audit-table tbody');
      tbody.innerHTML = '';

      if (error) {
        tbody.innerHTML = `<tr><td colspan="5" class="error-text">${error.message}</td></tr>`;
        return;
      }
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="hint">No activity recorded yet.</td></tr>';
        return;
      }

      for (const row of data) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${new Date(row.created_at).toLocaleString()}</td>
          <td>${row.profiles?.full_name || 'System'}</td>
          <td><span class="badge blue">${row.action}</span></td>
          <td>${row.entity_type}</td>
          <td class="hint">${row.detail ? JSON.stringify(row.detail) : '—'}</td>
        `;
        tbody.appendChild(tr);
      }
    }
  </script>
</body>
</html>
