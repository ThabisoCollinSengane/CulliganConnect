<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cases – CulliganConnect</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand"><span class="drop">C</span> CulliganConnect · Admin</div>
    <nav>
      <a href="/admin/index.html">Dashboard</a>
      <a href="/admin/cases.html" class="active">Cases</a>
      <a href="/admin/users.html">Agents</a>
      <a href="/admin/templates.html">Templates</a>
      <a href="/admin/reports.html">Reports</a>
      <a href="/admin/settings.html">Setup</a>
      <a href="/admin/audit-log.html">Audit Log</a>
      <a href="#" id="logout-link">Sign out</a>
    </nav>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <a href="/admin/index.html">Dashboard</a>
      <a href="/admin/cases.html" class="active">Cases</a>
      <a href="/admin/users.html">Agents</a>
      <a href="/admin/templates.html">Templates</a>
      <a href="/admin/reports.html">Reports</a>
      <a href="/admin/settings.html">Departments &amp; Setup</a>
      <a href="/admin/audit-log.html">Audit Log</a>
    </aside>

    <main class="main">
      <div class="card">
        <div class="toolbar">
          <h2 style="margin:0;">All cases</h2>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
          <input id="search-input" placeholder="Search case #, account #, or customer name…" style="flex:2; min-width:220px;" />
          <select id="status-filter" style="flex:1; min-width:160px;">
            <option value="">All statuses</option>
            <option value="new">New</option>
            <option value="pending">Pending</option>
            <option value="escalated">Escalated</option>
            <option value="awaiting_response">Awaiting Response</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Closed</option>
          </select>
          <select id="department-filter" style="flex:1; min-width:160px;"></select>
          <label style="display:flex; align-items:center; gap:6px; margin:0; white-space:nowrap;">
            <input type="checkbox" id="risk-only" style="width:auto;" /> At-risk only
          </label>
        </div>

        <div class="toolbar" id="bulk-toolbar" style="background:var(--light-blue); padding:10px 14px; border-radius:8px;">
          <span class="hint"><span id="selected-count">0</span> selected</span>
          <div style="display:flex; gap:8px; align-items:center;">
            <select id="bulk-agent-select" style="width:220px;"></select>
            <button class="btn secondary" id="bulk-assign-btn">Assign selected</button>
          </div>
        </div>

        <table id="cases-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="select-all" style="width:auto;" /></th>
              <th>Case #</th><th>Customer</th><th>Type</th><th>Status</th><th>Escalation</th><th>Assigned to</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module">
    import { supabase } from '/js/supabaseClient.js';
    import '/js/theme.js';
    import { requireRole, signOut } from '/js/auth.js';
    import { statusBadge, escalationCountdown } from '/js/caseHelpers.js';
    import { subscribeToNotifications } from '/js/notifications.js';

    const profile = await requireRole(['admin']);
    let agents = [];

    if (profile) {
      subscribeToNotifications(profile.id);
      await Promise.all([loadDepartments(), loadAgents()]);
      await loadCases();
    }

    document.getElementById('logout-link').addEventListener('click', (e) => {
      e.preventDefault();
      signOut();
    });

    document.getElementById('search-input').addEventListener('input', debounce(loadCases, 300));
    document.getElementById('status-filter').addEventListener('change', loadCases);
    document.getElementById('department-filter').addEventListener('change', loadCases);
    document.getElementById('risk-only').addEventListener('change', loadCases);

    function debounce(fn, ms) {
      let t;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
    }

    async function loadDepartments() {
      const { data } = await supabase.from('departments').select('id, name').eq('is_active', true).order('name');
      document.getElementById('department-filter').innerHTML = '<option value="">All departments</option>' +
        (data || []).map(d => `<option value="${d.id}">${d.name}</option>`).join('');
    }

    async function loadAgents() {
      const { data } = await supabase.from('profiles').select('id, full_name').eq('is_active', true).order('full_name');
      agents = data || [];
      const options = '<option value="">— unassigned —</option>' + agents.map(a => `<option value="${a.id}">${a.full_name}</option>`).join('');
      document.getElementById('bulk-agent-select').innerHTML = agents.map(a => `<option value="${a.id}">${a.full_name}</option>`).join('');
    }

    function agentOptionsHtml(selectedId) {
      return '<option value="">— unassigned —</option>' +
        agents.map(a => `<option value="${a.id}" ${a.id === selectedId ? 'selected' : ''}>${a.full_name}</option>`).join('');
    }

    async function loadCases() {
      const search = document.getElementById('search-input').value.trim();
      const status = document.getElementById('status-filter').value;
      const deptId = document.getElementById('department-filter').value;
      const riskOnly = document.getElementById('risk-only').checked;

      let query = supabase
        .from('cases')
        .select('id, case_number, customer_name, status, escalation_expires_at, assigned_to, department_id, case_types(name)')
        .order('created_at', { ascending: false })
        .limit(150);

      if (status) query = query.eq('status', status);
      if (deptId) query = query.eq('department_id', deptId);
      if (riskOnly) query = query.eq('status', 'escalated');
      if (search) query = query.or(`case_number.ilike.%${search}%,account_number.ilike.%${search}%,customer_name.ilike.%${search}%`);

      const { data, error } = await query;
      const tbody = document.querySelector('#cases-table tbody');
      tbody.innerHTML = '';

      if (error) {
        tbody.innerHTML = `<tr><td colspan="7" class="error-text">${error.message}</td></tr>`;
        return;
      }
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="hint">No cases found.</td></tr>';
        return;
      }

      for (const c of data) {
        const countdown = escalationCountdown(c.escalation_expires_at);
        const escalationCell = countdown
          ? `<span class="badge ${countdown.className}">${countdown.label}</span>`
          : '<span class="hint">—</span>';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input type="checkbox" class="row-select" data-id="${c.id}" style="width:auto;" /></td>
          <td class="case-link" style="cursor:pointer;">${c.case_number}</td>
          <td class="case-link" style="cursor:pointer;">${c.customer_name || '—'}</td>
          <td>${c.case_types?.name || '—'}</td>
          <td>${statusBadge(c.status)}</td>
          <td>${escalationCell}</td>
          <td><select class="assign-select" data-id="${c.id}" style="min-width:160px;">${agentOptionsHtml(c.assigned_to)}</select></td>
        `;
        tr.querySelectorAll('.case-link').forEach(el => {
          el.addEventListener('click', () => { window.location.href = `/agent/case.html?id=${c.id}`; });
        });
        tr.querySelector('.assign-select').addEventListener('change', async (e) => {
          await supabase.from('cases').update({ assigned_to: e.target.value || null }).eq('id', c.id);
          await loadCases();
        });
        tbody.appendChild(tr);
      }

      updateSelectedCount();
    }

    document.getElementById('select-all').addEventListener('change', (e) => {
      document.querySelectorAll('.row-select').forEach(cb => { cb.checked = e.target.checked; });
      updateSelectedCount();
    });

    document.querySelector('#cases-table').addEventListener('change', (e) => {
      if (e.target.classList.contains('row-select')) updateSelectedCount();
    });

    function updateSelectedCount() {
      const count = document.querySelectorAll('.row-select:checked').length;
      document.getElementById('selected-count').textContent = count;
    }

    document.getElementById('bulk-assign-btn').addEventListener('click', async () => {
      const ids = Array.from(document.querySelectorAll('.row-select:checked')).map(cb => cb.dataset.id);
      const agentId = document.getElementById('bulk-agent-select').value;
      if (ids.length === 0 || !agentId) return;

      await supabase.from('cases').update({ assigned_to: agentId }).in('id', ids);
      await loadCases();
      document.getElementById('select-all').checked = false;
    });
  </script>
</body>
</html>
